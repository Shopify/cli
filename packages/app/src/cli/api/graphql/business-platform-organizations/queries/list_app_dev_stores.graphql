query ListAppDevStores($searchTerm: String) {
  organization {
    id
    name
    accessibleShops(
      filters: [
        {field: STORE_TYPE, operator: EQUALS, value: "app_development"}
        {field: STORE_STATUS, operator: EQUALS, value: "ACTIVE"}
      ]
      search: $searchTerm
    ) {
      edges {
        node {
          id
          externalId
          name
          storeType
          primaryDomain
          shortName
          url
        }
      }
      pageInfo {
        hasNextPage
      }
    }
    currentUser {
      organizationPermissions
    }
  }
}
