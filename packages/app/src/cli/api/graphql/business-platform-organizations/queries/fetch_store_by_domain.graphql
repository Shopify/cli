query FetchStoreByDomain($domain: String, $filters: [ShopFilterInput!]) {
  organization {
    id
    name
    accessibleShops(filters: $filters, search: $domain) {
      edges {
        node {
          id
          externalId
          name
          storeType
          primaryDomain
          shortName
          url
        }
      }
    }
    currentUser {
      organizationPermissions
    }
  }
}
