mutation CreateAppDevelopmentStore($shopName: String!, $priceLookupKey: String!, $prepopulateTestData: Boolean) {
  createAppDevelopmentStore(
    shopName: $shopName
    priceLookupKey: $priceLookupKey
    prepopulateTestData: $prepopulateTestData
  ) {
    shopAdminUrl
    shopDomain
    userErrors {
      code
      field
      message
    }
  }
}
