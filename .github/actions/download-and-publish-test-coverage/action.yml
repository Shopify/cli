name: 'Download and publish test coverage'
description: 'Downloads test coverage stats from the base branch, publishes a comment with a summary'
inputs:
  base-branch-name:
    required: true
    description: 'Name of the branch to compare coverage with'
runs:
  using: 'composite'
  steps:
    # Strips forward slashes and dots as not supported by artifact commands
    - name: Clean base ref name
      shell: bash
      env:
        SAFE_BASE_REF_NAME: '${{ inputs.base-branch-name }}'
      run: |
        SAFE_BASE_REF_NAME="${SAFE_BASE_REF_NAME//[\/.]/}"
        echo "SAFE_BASE_REF_NAME=${SAFE_BASE_REF_NAME}" >> $GITHUB_ENV
    - name: Download artifact
      id: download-artifact
      # We use this action and not Github's default, due to https://github.com/actions/download-artifact/issues/3
      uses: dawidd6/action-download-artifact@e6e25ac3a2b93187502a8be1ef9e9603afc34925 # v2.24.2
      with:
        workflow: tests-main.yml
        workflow_conclusion: success
        branch: ${{ inputs.base-branch-name }}
        name: ${{ env.SAFE_BASE_REF_NAME }}--coverage-report
        if_no_artifact_found: ignore
    - name: Check baseline artifact
      id: baseline
      shell: bash
      env:
        BASE_BRANCH_NAME: '${{ inputs.base-branch-name }}'
      run: |
        if [[ -f ./baseline-report.json ]]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "Found baseline coverage artifact for ${BASE_BRANCH_NAME} from tests-main.yml."
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Baseline coverage artifact for ${BASE_BRANCH_NAME} was not found in tests-main.yml. Publishing coverage without a baseline diff."
        fi
    - name: Build baseline notice
      id: baseline-notice
      shell: bash
      run: |
        if [[ "${{ steps.baseline.outputs.present }}" == 'true' ]]; then
          {
            echo 'message<<EOF'
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo 'message<<EOF'
            echo '> [!WARNING]'
            echo '> Baseline coverage artifact for `${{ inputs.base-branch-name }}` from `tests-main.yml` was not found. Coverage diff is unavailable for this run.'
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        fi
    - uses: ArtiomTr/jest-coverage-report-action@df2b025553c31d68f84be6337843e277e2576844 # v2.2.1
      id: coverage
      with:
        annotations: none
        output: report-markdown
        coverage-file: './report.json'
        base-coverage-file: './baseline-report.json'
        threshold: 0
    - uses: marocchino/sticky-pull-request-comment@fcf6fe9e4a0409cd9316a5011435be0f3327f1e1 # v2.3.1
      with:
        message: ${{ steps.baseline-notice.outputs.message }}${{ steps.coverage.outputs.report }}
