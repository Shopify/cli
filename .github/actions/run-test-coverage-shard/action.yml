name: 'Run test coverage shard'
description: 'Runs a sharded coverage slice and uploads the blob report for later merge'
inputs:
  shard:
    required: true
    description: 'Vitest shard selector in N/T form, for example 1/2'
runs:
  using: 'composite'
  steps:
    - name: Prepare shard metadata
      shell: bash
      env:
        COVERAGE_SHARD: ${{ inputs.shard }}
      run: |
        SHARD_INDEX="${COVERAGE_SHARD%%/*}"
        echo "COVERAGE_SHARD_INDEX=${SHARD_INDEX}" >> "$GITHUB_ENV"
        echo "COVERAGE_BLOB_ARTIFACT=coverage-blob-${SHARD_INDEX}" >> "$GITHUB_ENV"
    - name: Unit tests with coverage (shard)
      shell: bash
      env:
        COVERAGE_SHARD: ${{ inputs.shard }}
        VITEST_MIN_THREADS: '1'
        VITEST_MAX_THREADS: '4'
      run: pnpm vitest run --coverage --coverage.all=false --reporter=blob --outputFile="vitest-blob-reports/blob-${COVERAGE_SHARD_INDEX}.json" --shard "${COVERAGE_SHARD}"
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ env.COVERAGE_BLOB_ARTIFACT }}
        path: vitest-blob-reports/
        retention-days: 1
